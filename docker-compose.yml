version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: engage-publisher-app
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      APP_BASE_URL: ${APP_BASE_URL}
      UPLOADS_DIR: /data/uploads
      PG_SSL: ${PG_SSL:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
    volumes:
      - app_uploads:/data/uploads

volumes:
  app_uploads:
