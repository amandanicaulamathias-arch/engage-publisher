<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Engage Publisher</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="page">
    <section class="hero" style="max-width: 520px; margin: 64px auto 0;">
      <h1>Login da Equipe</h1>
      <div id="mensagemLogin" class="feedback" style="display: none;"></div>

      <form id="loginForm" class="stack">
        <div class="field">
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" required>
        </div>

        <div class="field">
          <label for="senha">Senha</label>
          <input type="password" id="senha" name="senha" required>
        </div>

        <div class="actions">
          <button type="submit" class="button">Entrar</button>
          <a class="button secondary" href="/cadastro.html">Criar conta</a>
        </div>
      </form>
    </section>
  </main>

  <script>
    const mensagemLogin = document.getElementById('mensagemLogin');

    function exibirMensagem(texto, tipo = 'sucesso') {
      mensagemLogin.textContent = texto;
      mensagemLogin.className = tipo === 'erro' ? 'feedback error' : 'feedback';
      mensagemLogin.style.display = 'block';
    }

    async function lerResposta(resposta) {
      const contentType = resposta.headers.get('content-type') || '';

      if (contentType.includes('application/json')) {
        return resposta.json();
      }

      const texto = await resposta.text();
      return {
        mensagem: texto.startsWith('<!DOCTYPE') ? 'O servidor respondeu com HTML em vez de JSON.' : texto
      };
    }

    document.getElementById('loginForm').addEventListener('submit', async (event) => {
      event.preventDefault();

      const email = document.getElementById('email').value;
      const senha = document.getElementById('senha').value;

      try {
        const resposta = await fetch('/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email, senha })
        });

        const resultado = await lerResposta(resposta);

        if (!resposta.ok) {
          exibirMensagem(resultado.mensagem || 'Erro no login.', 'erro');
          return;
        }

        window.location.href = '/dashboard.html';
      } catch (erro) {
        exibirMensagem('Erro ao tentar fazer login.', 'erro');
      }
    });
  </script>
</body>
</html>
